name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Unzip project
        run: unzip "PubgBooster.zip"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.1.1'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Build APK
        working-directory: PubgBooster
        run: gradle assembleDebug --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: PubgBooster-APK
          path: PubgBooster/app/build/outputs/apk/debug/app-debug.apk
